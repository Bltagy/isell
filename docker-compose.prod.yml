# Production override for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this file does:
#   - Removes all debug/internal port bindings (MySQL, Redis, Meilisearch, MinIO, Mailpit, Reverb)
#   - Adds memory + CPU resource limits to every service
#   - Configures nginx for SSL on port 443 with Let's Encrypt (certbot) volumes
#   - Sets restart: always for automatic recovery
#   - Adds structured logging with max-size rotation
#   - Sets production environment variables

services:

  # ─── Nginx (SSL-ready) ───────────────────────────────────
  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Laravel App (PHP-FPM) ────────────────────────────────
  laravel-app:
    restart: always
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─── Laravel Horizon (Queue Worker) ──────────────────────
  laravel-horizon:
    restart: always
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Laravel Reverb (WebSocket Server) ───────────────────
  # No host port binding in production — traffic routed through nginx
  laravel-reverb:
    restart: always
    ports: !reset []
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── MySQL 8 ─────────────────────────────────────────────
  # No host port binding in production
  mysql8:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis ───────────────────────────────────────────────
  # No host port binding in production
  redis:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Meilisearch ─────────────────────────────────────────
  # No host port binding in production
  meilisearch:
    restart: always
    ports: !reset []
    environment:
      MEILI_ENV: production
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── MinIO (S3-compatible) ────────────────────────────────
  # No host port binding in production — access via nginx or internal only
  minio:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Mailpit ─────────────────────────────────────────────
  # Disabled in production — no mail debug UI exposed
  mailpit:
    restart: always
    ports: !reset []
    profiles:
      - debug

  # ─── Next.js Admin Dashboard ─────────────────────────────
  nextjs-app:
    restart: always
    ports: !reset []
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_REVERB_APP_KEY=${REVERB_APP_KEY}
      - NEXT_PUBLIC_REVERB_HOST=${APP_DOMAIN}
      - NEXT_PUBLIC_REVERB_PORT=443
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

# ─── Certbot volumes for Let's Encrypt SSL ───────────────────
volumes:
  certbot_webroot:
  certbot_certs:
