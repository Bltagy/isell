name: isell
description: SaaS Multi-Tenant Food Ordering Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3
  retrofit: ^4.1.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # UI
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  google_fonts: ^6.2.1

  # Firebase
  firebase_messaging: ^15.0.0

  # Maps & WebView
  google_maps_flutter: ^2.6.0
  webview_flutter: ^4.7.0

  # WebSocket
  web_socket_channel: ^3.0.1

  # Localization
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

  fonts: []
